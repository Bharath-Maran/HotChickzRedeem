services:
  - type: web
    name: hotchickz-api
    env: python
    region: ohio           # closest to Fort Wayne, IN
    plan: free
    rootDir: backend       # Render runs all commands from this subdirectory
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false        # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false        # e.g. https://hotchickzoffer.com
      - key: USE_SSL
        value: "true"
